services:
  - type: web
    name: procam-crm
    env: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: procam-crm-db
          property: connectionString
      - key: DEBUG
        value: false

databases:
  - name: procam-crm-db
    databaseName: procam_crm
    user: procam
    region: singapore
    plan: starter
