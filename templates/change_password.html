<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Procam CRM — Set Password</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;min-height:100vh;background:#F5F7FA;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:14px;padding:44px 46px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.bars{display:flex;flex-direction:column;gap:3px}
.bar{border-radius:2px;background:#474447}
.bar.r{background:#C72435}
.name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#474447}
.name em{color:#C72435;font-style:normal}
h1{font-size:20px;font-weight:700;color:#1A1D23;margin-bottom:4px}
.sub{font-size:13px;color:#8B919E;margin-bottom:24px}
.notice{background:#FDF1F2;border:1px solid #F5C2C6;border-radius:8px;padding:11px 14px;font-size:12.5px;color:#A31D2B;margin-bottom:20px;line-height:1.55}
.fg{margin-bottom:16px}
.fl{display:block;font-size:10.5px;font-weight:700;color:#4A4F5C;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fi{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid #E4E7EC;font-size:13.5px;font-family:'Barlow',sans-serif;color:#1A1D23;transition:.15s}
.fi:focus{outline:none;border-color:#C72435;box-shadow:0 0 0 3px rgba(199,36,53,.1)}
.btn{width:100%;padding:13px;background:#C72435;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Barlow',sans-serif;cursor:pointer;transition:.15s;margin-top:4px}
.btn:hover{background:#E8374A}
.err{color:#A31D2B;font-size:12.5px;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="https://www.procamlogistics.com/public/frontend/assets/img/logo.png" alt="Procam Group" style="height:28px;object-fit:contain"></div>
  <h1>Set your password</h1>
  <p class="sub">Welcome, {{ emp.name }}. Please set a personal password to continue.</p>
  <div class="notice">Your default password was your Employee Code (<strong>{{ emp.emp_code|lower }}</strong>). Please choose a new secure password now.</div>
  <div class="fg"><label class="fl">Current Password</label><input class="fi" type="password" id="cur" placeholder="Your current / default password" autocomplete="current-password"></div>
  <div class="fg"><label class="fl">New Password (min 6 characters)</label><input class="fi" type="password" id="nw" placeholder="Choose a strong password" autocomplete="new-password"></div>
  <div class="fg"><label class="fl">Confirm New Password</label><input class="fi" type="password" id="cf" placeholder="Repeat your new password" onkeydown="if(event.key==='Enter')go()"></div>
  <button class="btn" onclick="go()">Set Password & Continue →</button>
  <div class="err" id="err"></div>
</div>
<script>
async function go(){
  const cur=document.getElementById('cur').value;
  const nw=document.getElementById('nw').value;
  const cf=document.getElementById('cf').value;
  const err=document.getElementById('err');
  if(nw.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  if(nw!==cf){err.textContent='Passwords do not match.';err.style.display='block';return;}
  const r=await fetch('/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current:cur,new_password:nw})});
  const d=await r.json();
  if(d.ok){window.location.href='/app';}
  else{err.textContent=d.error||'Error. Please check your current password.';err.style.display='block';}
}
</script>
</body>
</html>
